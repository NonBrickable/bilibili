spring.datasource.url=jdbc:mysql://localhost:3306/imooc_bilibili
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#rocketmq
rocketmq.name.server.address=127.0.0.1:9876

# 分布式文件系统FDFS配置
# 连接超时时间
fdfs.connect-timeout=600
# 读取超时时间
fdfs.so-timeout=1500
# 缩略图的宽高
fdfs.thumb-image.height=150
fdfs.thumb-image.width=150
# tracker服务配置地址列表，替换成自己服务的IP地址，支持多个
fdfs.tracker-list=39.107.54.180:22122
fdfs.pool.jmx-enabled=false
fdfs.http.storage-addr = 6.6.6.6

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB